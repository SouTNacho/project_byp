<form action="" method="post">
    <div>
        <label for="user_name">Nombre</label>
        <input type="text" name="user_name" id="user_name" required>
        <span id="user_name_container"></span>
    </div>
    <div>
        <label for="last_name">Apellido</label>
        <input type="text" name="last_name" id="last_name" required>
        <span id="last_name_container"></span>
    </div>
    <div>
        <label for="document">Documento</label>
        <input type="text" name="document" id="document" required>
        <span id="document_container"></span>
    </div>
    <div>
        <label for="birthdate">Fecha de Nacimiento</label>
        <input type="text" name="birthdate" id="birthdate" required>
        <span id="birthdate_container"></span>
    </div>
    <div>
        <label for="nationality">Nacionalidad</label>
        <select name="nationality" id="nationality" required>
            <option value="">Seleccione una opcion</option>
        </select>
        <span id="nationality_container"></span>
    </div>
    <div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>
        <span id="email_container"></span>
    </div>
    <div>
        <div>
            <label for="phone_code">Celular</label>
            <select name="phone_code" id="phone_code" required>
                <option value="">Seleccione una opcion</option>
            </select>
            <span id="phone_code_container"></span>
        </div>
        <div>
            <input type="text" name="phone_number" id="phone_number" required>
            <span id="phone_number_container"></span>
        </div>
    </div>
    <div>
        <label for="department">Departamento</label>
        <select name="department" id="department" required>
            <option value="">Seleccione una opcion</option>
        </select>
        <span id="department_container"></span>
    </div>
    <div>
        <label for="locality">Localidad</label>
        <select name="locality" id="locality" required>
            <option value="">Seleccione una opcion</option>
        </select>
        <span id="locality_container"></span>
    </div>
    <div id="hidden">
        <label for="other_locality">Especifique</label>
        <input type="text" name="other_locality" id="other_locality">
        <span id="other_locality_container"></span>
    </div>
    <div>
        <label for="direction">Direccion</label>
        <input type="text" name="direction" id="direction" required>
        <span id="direction_container"></span>
    </div>
    <div>
        <label for="door_number">Numero de Puerta</label>
        <input type="text" name="door_number" id="door_number" required>
        <span id="door_number_container"></span>
    </div>
    <div>
        <label for="contact_name">Nombre Contacto</label>
        <input type="text" name="contact_name" id="contact_name" required>
        <span id="contact_name_container"></span>
    </div>
    <div>
        <div>
            <label for="contact_phone_code">Celular</label>
            <select name="contact_phone_code" id="contact_phone_code" required>
                <option value="">Seleccione una opcion</option>
            </select>
            <span id="contact_phone_code_container"></span>
        </div>
        <div>
            <input type="text" name="contact_phone_number" id="contact_phone_number" required>
            <span id="contact_phone_number_container"></span>
        </div>
    </div>
    <div>
        <label for="relation_type">Tipo de Relacion</label>
        <select name="relation_type" id="relation_type" required>
            <option value="">Seleccione una opcion</option>
        </select>
        <span id="relation_type_container"></span>
    </div>
    <div>
        <label for="password">Contrasenha</label>
        <input type="text" name="password" id="password" required>
        <span id=""></span>
    </div>
    <div>
        <label for="confirm_password">Confirmar Contrasenha</label>
        <input type="text" name="confirm_password" id="confirm_password" required>
        <span id=""></span>
    </div>
    <div>
        <input type="submit" id="send_form">
    </div>
</form>
